<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="theme-color" content="#06060f"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="RICO"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="description" content="Controle financeiro inteligente com IA — gerencie seu dinheiro e conquiste seus objetivos."/>
<title>RICO — Controle Financeiro</title>
<link rel="manifest" id="mph"/>
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%2306060f'/%3E%3Ctext y='125' x='90' text-anchor='middle' font-size='100'%3E%F0%9F%92%8E%3C/text%3E%3C/svg%3E"/>
<link rel="stylesheet" href="/style.css" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div id="auth-overlay" class="ov" style="z-index: 200; align-items: center; justify-content: center; background: var(--bg2);">

  <!-- ── TELA DE LOGIN ── -->
  <div id="auth-login" class="card" style="width:90%;max-width:360px;">
    <div style="text-align:center;margin-bottom:22px">
      <div style="font-size:40px;line-height:1">💎</div>
      <h2 style="color:var(--green);margin:8px 0 2px;font-size:24px;font-weight:900;letter-spacing:-.5px">RICO</h2>
      <p style="font-size:10px;color:var(--muted2);letter-spacing:1px;text-transform:uppercase">Controle Financeiro</p>
    </div>
    <p class="sl" style="text-align:center;margin-bottom:18px;font-size:15px">Entrar na conta</p>
    <div id="auth-error" style="font-size:12px;margin-bottom:10px;display:none;padding:8px 12px;border-radius:8px;background:rgba(248,113,113,.12);border:1px solid rgba(248,113,113,.3)"></div>
    <input type="email" id="auth-email" class="ip" placeholder="Email" autocomplete="email"/>
    <input type="password" id="auth-pass" class="ip" placeholder="Senha" autocomplete="current-password"/>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:18px">
      <input type="checkbox" id="auth-remember" style="width:16px;height:16px;accent-color:var(--green);cursor:pointer;flex-shrink:0"/>
      <label for="auth-remember" style="font-size:12px;color:var(--muted);cursor:pointer;user-select:none">Lembrar meu acesso</label>
    </div>
    <button class="sb" id="btn-login">Entrar</button>
    <p style="text-align:center;font-size:12px;color:var(--muted2);margin-top:16px">
      Não tem conta?
      <a href="#" onclick="switchAuth('register');return false" style="color:var(--green);text-decoration:none;font-weight:700">Criar conta gratuita →</a>
    </p>
  </div>

  <!-- ── TELA DE CADASTRO ── -->
  <div id="auth-register" class="card" style="width:90%;max-width:360px;display:none;">
    <div style="text-align:center;margin-bottom:22px">
      <div style="font-size:40px;line-height:1">💎</div>
      <h2 style="color:var(--green);margin:8px 0 2px;font-size:24px;font-weight:900;letter-spacing:-.5px">RICO</h2>
      <p style="font-size:10px;color:var(--muted2);letter-spacing:1px;text-transform:uppercase">Controle Financeiro com IA</p>
    </div>
    <p class="sl" style="text-align:center;margin-bottom:4px;font-size:15px">Criar conta gratuita</p>
    <p style="text-align:center;font-size:11px;color:var(--muted2);margin-bottom:18px">Gerencie seu dinheiro com inteligência artificial</p>
    <div id="auth-error-reg" style="font-size:12px;margin-bottom:10px;display:none;padding:8px 12px;border-radius:8px"></div>
    <input type="email" id="auth-email-reg" class="ip" placeholder="Email" autocomplete="email"/>
    <input type="password" id="auth-pass-reg" class="ip" placeholder="Senha (mínimo 6 caracteres)" autocomplete="new-password"/>
    <button class="sb" id="btn-register">Criar Conta Gratuita</button>
    <p style="text-align:center;font-size:12px;color:var(--muted2);margin-top:16px">
      Já tem conta?
      <a href="#" onclick="switchAuth('login');return false" style="color:var(--green);text-decoration:none;font-weight:700">← Entrar</a>
    </p>
  </div>

</div>
<div id="app" style="display:none">
<div id="header">
  <div class="rw" style="gap:8px">
    <span style="font-size:20px">💎</span>
    <div>
      <b style="font-size:18px;font-weight:800;color:var(--green);letter-spacing:-.5px;display:block">RICO</b>
      <span style="font-size:8px;color:var(--muted2);letter-spacing:.5px">Controle Financeiro</span>
    </div>
  </div>
  <div class="rw" style="gap:10px">
    <button id="btn-logout" class="ib" onclick="doLogout()" style="color:var(--red); padding:3px 8px; font-weight:bold" title="Sair">Sair</button>
    <button class="theme-btn" id="theme-toggle" onclick="toggleTheme()" title="Tema"></button>
    <div style="display:flex;flex-direction:column;align-items:flex-end">
      <span id="huser" style="font-size:9px;color:var(--muted2);max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>
      <span class="ti" style="font-size:9px;text-transform:uppercase;letter-spacing:1px">saldo</span>
      <span id="hb" class="mo" style="font-size:16px;font-weight:700;color:var(--green)">R$ 0,00</span>
    </div>
  </div>
</div>
<div id="main"></div>
<nav id="nav">
  <button class="nb act" data-v="dashboard" onclick="sv('dashboard')"><span style="font-size:15px">📊</span><span class="nl">Início</span></button>
  <button class="nb" data-v="bills" onclick="sv('bills')"><span style="font-size:15px;position:relative">📋<span id="bills-dot" class="notif-dot" style="display:none"></span></span><span class="nl">Contas</span></button>
  <button class="nb" data-v="debts" onclick="sv('debts')"><span style="font-size:15px">💳</span><span class="nl">Dívidas</span></button>
  <button class="nb" data-v="shopping" onclick="sv('shopping')"><span style="font-size:15px">🛒</span><span class="nl">Compras</span></button>
  <button class="nb" data-v="invest" onclick="sv('invest')"><span style="font-size:15px">📈</span><span class="nl">Investir</span></button>
  <button class="nb" data-v="ai" onclick="sv('ai')"><span style="font-size:15px">🤖</span><span class="nl">IA</span></button>
</nav>
<button id="fab" onclick="om('tx')">＋</button>
<div id="mov" class="ov" style="display:none" onclick="cm()">
  <div class="sh" onclick="event.stopPropagation()"><div id="mc"></div></div>
</div>
</div>

<script type="module" src="/main.js"></script>
</body>
</html>
